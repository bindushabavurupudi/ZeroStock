<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeerostock Inventory Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Zeerostock Surplus Inventory Search</h1>
    
    <form id="searchForm">
      <div class="form-group">
        <label for="q">Product Name (partial):</label>
        <input type="text" id="q" placeholder="e.g., laptop">
      </div>
      
      <div class="form-group">
        <label for="category">Category:</label>
        <select id="category">
          <option value="">All Categories</option>
          <!-- Populated by JS -->
        </select>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="minPrice">Min Price:</label>
          <input type="number" id="minPrice" min="0" step="0.01" placeholder="0">
        </div>
        <div class="form-group">
          <label for="maxPrice">Max Price:</label>
          <input type="number" id="maxPrice" min="0" step="0.01" placeholder="∞">
        </div>
      </div>
      
      <button type="submit">Search</button>
      <button type="button" id="clearBtn">Clear</button>
    </form>
    
    <div id="errorMsg" class="error hidden"></div>
    
    <div id="resultsInfo" class="info hidden"></div>
    
    <table id="resultsTable" class="results-table hidden">
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
    
    <div id="noResults" class="no-results hidden">No results found.</div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
